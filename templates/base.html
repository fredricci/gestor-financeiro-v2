<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Gestor Financeiro{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    </div>
    <span class="sidebar-title">Gestor <span>Financeiro</span></span>
  </div>

  <nav class="sidebar-nav">
    <a class="nav-item {{ 'ativo' if pagina == 'upload' }}" href="/upload">
      <i data-lucide="upload-cloud"></i><span class="nav-label">Upload</span>
    </a>
    <a class="nav-item {{ 'ativo' if pagina == 'lancamentos' }}" href="/lancamentos">
      <i data-lucide="list"></i><span class="nav-label">Lançamentos</span>
    </a>
    <a class="nav-item {{ 'ativo' if pagina == 'grafico' }}" href="/grafico">
      <i data-lucide="bar-chart-2"></i><span class="nav-label">Gráfico</span>
    </a>
    <a class="nav-item {{ 'ativo' if pagina == 'categorias' }}" href="/categorias">
      <i data-lucide="tags"></i><span class="nav-label">Categorias</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <button class="toggle-btn" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">
      <i data-lucide="chevrons-left"></i><span class="toggle-label">Recolher</span>
    </button>
  </div>
</aside>

<main class="main">
  {% block content %}{% endblock %}
</main>

<script>
  function initIcons(){ if(window.lucide) lucide.createIcons(); }
  document.addEventListener('DOMContentLoaded', initIcons);
  // Re-renderiza ícones e reprocessa nós após qualquer swap do HTMX.
  document.body.addEventListener('htmx:afterSwap', initIcons);
  document.body.addEventListener('htmx:load', initIcons);
</script>
{% block scripts %}{% endblock %}
</body>
</html>
